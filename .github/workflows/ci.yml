name: ci

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests scripts

      - name: Type-check (non-blocking)
        continue-on-error: true
        run: mypy

      - name: Pull results (best-effort; data-dependent tests skip if it fails)
        continue-on-error: true
        run: python -m mundial.ingest.results

      - name: Test
        run: pytest --cov=mundial --cov-report=term-missing -q
